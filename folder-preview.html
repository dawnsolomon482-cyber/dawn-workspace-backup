<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folder Preview – Dawn Solomon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b1623;
      background-image: radial-gradient(circle at 20% 50%, rgba(0,180,150,0.04) 0%, transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(0,180,150,0.03) 0%, transparent 50%);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 80px;
    }

    h1 {
      color: #00d4aa;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: -60px;
    }

    .folders-row {
      display: flex;
      gap: 48px;
      align-items: flex-end;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* === FOLDER CARD === */
    .folder-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .folder-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Peeking cards */
    .peeks {
      position: relative;
      width: 240px;
      height: 120px;
      margin-bottom: -8px;
    }

    .peek-card {
      position: absolute;
      width: 160px;
      height: 90px;
      border-radius: 10px;
      border: 1px solid rgba(0,212,170,0.18);
      background: rgba(0,212,170,0.04);
      backdrop-filter: blur(8px);
      overflow: hidden;
      bottom: 0;
      left: 50%;
      box-shadow: 0 4px 20px rgba(0,212,170,0.08);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .peek-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      opacity: 0.85;
    }

    .peek-card .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .peek-card .no-img span {
      display: block;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(0,212,170,0.15);
      border: 1px solid rgba(0,212,170,0.25);
    }

    .peek-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(11,22,35,0.5));
    }

    .peek-card:nth-child(1) { transform: translateX(-50%) rotate(-8deg); z-index: 1; }
    .peek-card:nth-child(2) { transform: translateX(-50%) rotate(0deg) translateY(-6px); z-index: 2; }
    .peek-card:nth-child(3) { transform: translateX(-50%) rotate(8deg); z-index: 1; }

    .folder-wrap:hover .peek-card:nth-child(1) { transform: translateX(-50%) rotate(-8deg) translateY(-18px); }
    .folder-wrap:hover .peek-card:nth-child(2) { transform: translateX(-50%) rotate(0deg) translateY(-28px); }
    .folder-wrap:hover .peek-card:nth-child(3) { transform: translateX(-50%) rotate(8deg) translateY(-18px); }

    /* Folder body */
    .folder-body {
      position: relative;
      width: 240px;
      border-radius: 18px;
      border: 1px solid rgba(0,212,170,0.25);
      background: rgba(13,26,42,0.7);
      backdrop-filter: blur(20px);
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,212,170,0.06) inset;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
      z-index: 3;
    }

    /* Shine line at top */
    .folder-body::before {
      content: '';
      position: absolute;
      top: 0; left: 20%; right: 20%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,212,170,0.5), transparent);
      border-radius: 50%;
    }

    /* Inner glow */
    .folder-body::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(0,212,170,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .folder-wrap:hover .folder-body {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 40px rgba(0,212,170,0.08);
      border-color: rgba(0,212,170,0.4);
    }

    /* Ambient glow */
    .folder-glow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 30px;
      background: rgba(0,212,170,0.2);
      border-radius: 50%;
      filter: blur(20px);
      pointer-events: none;
      transition: opacity 0.3s ease;
      opacity: 0.5;
    }

    .folder-wrap:hover .folder-glow { opacity: 1; }

    /* Icon */
    .folder-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      transition: transform 0.3s ease;
    }

    .folder-wrap:hover .folder-icon { transform: scale(1.1); }

    .folder-icon svg {
      width: 24px;
      height: 24px;
      color: #00d4aa;
      stroke: #00d4aa;
    }

    .folder-name {
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .folder-count {
      color: rgba(0,212,170,0.7);
      font-size: 11px;
      font-weight: 500;
    }

    .folder-pulse {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #00d4aa;
      animation: pulse 2s ease-in-out infinite;
    }

    .folder-pulse span {
      color: rgba(255,255,255,0.35);
      font-size: 10px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Float animation for whole folder */
    .folder-inner {
      animation: float 4s ease-in-out infinite;
    }

    .folder-wrap:nth-child(2) .folder-inner { animation-delay: 0.5s; }
    .folder-wrap:nth-child(3) .folder-inner { animation-delay: 1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .label-below {
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1>Portfolio Folder Preview — Dawn Solomon Branding</h1>

  <div class="folders-row">

    <!-- Folder 1: Explore Live Websites -->
    <div class="folder-wrap">
      <div class="folder-inner">
        <div class="peeks">
          <div class="peek-card"><div class="no-img"><span></span></div></div>
          <div class="peek-card"><div class="no-img"><span></span></div></div>

        </div>
        <div class="folder-body">
          <div class="folder-glow"></div>
          <div class="folder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18z"/><path d="M3.6 9h16.8M3.6 15h16.8M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18"/>
            </svg>
          </div>
          <p class="folder-name">Explore Live Websites</p>
          <p class="folder-count">3 projects inside</p>

    </div>

    <!-- Folder 2: Custom Planner Projects -->
    <div class="folder-wrap">
      <div class="folder-inner">
        <div class="peeks">
          <div class="peek-card"><div class="no-img"><span></span></div></div>
          <div class="peek-card"><div class="no-img"><span></span></div></div>
          <div class="peek-card"><div class="no-img"><span></span></div></div>
        </div>
        <div class="folder-body">
          <div class="folder-glow"></div>
          <div class="folder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/>
            </svg>
          </div>
          <p class="folder-name">Custom Planner Projects</p>
          <p class="folder-count">3 projects inside</p>
          <div class="folder-pulse"><div class="pulse-dot"></div><span>Click to explore</span></div>
        </div>
      </div>
      <p class="label-below">Planner Projects</p>
    </div>

    <!-- Folder 3: Live Dashboards -->
    <div class="folder-wrap">
      <div class="folder-inner">
        <div class="peeks">
          <div class="peek-card"><div class="no-img"><span></span></div></div>
          <div class="peek-card"><div class="no-img"><span></span></div></div>
          <div class="peek-card"><div class="no-img"><span></span></div></div>
        </div>
        <div class="folder-body">
          <div class="folder-glow"></div>
          <div class="folder-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
            </svg>
          </div>
          <p class="folder-name">Live Dashboards</p>
          <p class="folder-count">3 projects inside</p>
          <div class="folder-pulse"><div class="pulse-dot"></div><span>Click to explore</span></div>
        </div>
      </div>
      <p class="label-below">Live Dashboards</p>
    </div>

  </div>

</body>
</html>
