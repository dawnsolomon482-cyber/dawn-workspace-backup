<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Generator — Dawn Solomon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<!--
  HOW TO RUN LOCALLY
  ──────────────────
  1. Keep index.html, style.css, script.js in the same folder.
  2. Double-click index.html to open in your browser.
  3. Fill in the form, click Preview, then Download PDF.
  4. In the browser print dialog → set Destination: "Save as PDF" → Save.
  Works 100% offline. No installation needed.
-->

<div class="app" id="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand">
        <div class="brand-logo">
          <svg width="40" height="40" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
            <rect width="60" height="60" rx="12" fill="#111827"/>
            <rect x="4" y="4" width="52" height="52" rx="9" fill="none" stroke="#00c9a7" stroke-width="2"/>
            <text x="30" y="42" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">Dawn Solomon</span>
          <span class="brand-sub">Invoice Generator</span>
        </div>
      </div>
      <div class="hdr-actions">
        <button class="btn btn-ghost" id="btn-reset">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          Reset
        </button>
        <button class="btn btn-sec" id="btn-preview">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Preview
        </button>
        <button class="btn btn-pri" id="btn-download">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="grid">

      <!-- LEFT -->
      <div class="col col-left">

        <section class="card">
          <div class="card-hd"><span class="clabel">Invoice Details</span></div>
          <div class="card-bd">
            <div class="field">
              <label for="invoice-num">Invoice Number</label>
              <div class="input-row">
                <input type="text" id="invoice-num" readonly placeholder="INV-202505-0001" />
                <button class="icon-btn" id="btn-regen" title="Generate new number">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                </button>
              </div>
            </div>
            <div class="row2">
              <div class="field">
                <label for="issue-date">Issue Date</label>
                <input type="date" id="issue-date" />
              </div>
              <div class="field">
                <label for="due-date">Due Date</label>
                <input type="date" id="due-date" />
              </div>
            </div>
            <div class="field">
              <label for="currency">Currency</label>
              <select id="currency">
                <option value="USD" data-sym="$">USD — US Dollar ($)</option>
                <option value="EUR" data-sym="€">EUR — Euro (€)</option>
                <option value="GBP" data-sym="£">GBP — British Pound (£)</option>
                <option value="SGD" data-sym="S$">SGD — Singapore Dollar (S$)</option>
                <option value="PHP" data-sym="₱">PHP — Philippine Peso (₱)</option>
                <option value="AUD" data-sym="A$">AUD — Australian Dollar (A$)</option>
                <option value="CAD" data-sym="C$">CAD — Canadian Dollar (C$)</option>
                <option value="JPY" data-sym="¥">JPY — Japanese Yen (¥)</option>
                <option value="CHF" data-sym="CHF ">CHF — Swiss Franc</option>
                <option value="HKD" data-sym="HK$">HKD — Hong Kong Dollar (HK$)</option>
              </select>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-hd"><span class="clabel">Client Information</span></div>
          <div class="card-bd">
            <div class="field">
              <label for="client-name">Client Name</label>
              <input type="text" id="client-name" placeholder="Full name" />
            </div>
            <div class="field">
              <label for="client-email">Client Email</label>
              <input type="email" id="client-email" placeholder="client@example.com" />
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-hd"><span class="clabel">Branding</span></div>
          <div class="card-bd">
            <div class="upload-row">
              <div class="upload-slot">
                <span class="upload-title">Logo</span>
                <div class="upload-preview" id="logo-preview">
                  <img id="logo-img" src="" alt="Logo" style="display:none" />
                  <span id="logo-empty" class="upload-empty-icon">
                    <svg width="28" height="28" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
                      <rect width="60" height="60" rx="12" fill="#111827"/>
                      <rect x="4" y="4" width="52" height="52" rx="9" fill="none" stroke="#00c9a7" stroke-width="2"/>
                      <text x="30" y="42" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
                    </svg>
                  </span>
                </div>
                <label class="upload-btn" for="logo-upload">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Change Logo
                </label>
                <input type="file" id="logo-upload" accept="image/*" hidden />
              </div>
              <div class="upload-slot">
                <span class="upload-title">Signature</span>
                <div class="upload-preview" id="sig-preview">
                  <img id="sig-img" src="" alt="Signature" style="display:none" />
                  <span id="sig-empty" class="upload-empty-text">No signature</span>
                </div>
                <label class="upload-btn" for="sig-upload">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Upload Signature
                </label>
                <input type="file" id="sig-upload" accept="image/*" hidden />
              </div>
            </div>
          </div>
        </section>

      </div><!-- /col-left -->

      <!-- RIGHT -->
      <div class="col col-right">

        <section class="card">
          <div class="card-hd"><span class="clabel">Project &amp; Amount</span></div>
          <div class="card-bd">
            <div class="field">
              <label for="project-name">Project Name</label>
              <input type="text" id="project-name" placeholder="e.g. Brand Identity Design" />
            </div>
            <div class="field">
              <label for="project-desc">Project Description <span class="opt">(optional)</span></label>
              <textarea id="project-desc" rows="2" placeholder="Brief description of the work delivered..."></textarea>
            </div>
            <div class="amount-box">
              <div class="field">
                <label for="project-amount">Project Amount</label>
                <div class="amount-input-wrap">
                  <span class="amount-sym" id="amount-sym">$</span>
                  <input type="number" id="project-amount" class="amount-input" placeholder="0.00" min="0" step="0.01" />
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-hd"><span class="clabel">Payment Summary</span></div>
          <div class="card-bd">
            <div class="summary">
              <div class="sum-row sum-grand">
                <span>Total Amount</span>
                <span id="s-amount">$0.00</span>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-hd"><span class="clabel">Payment Methods</span></div>
          <div class="card-bd">
            <div class="pay-tabs" id="pay-tabs">
              <button class="ptab active" data-tab="wise">Wise</button>
              <button class="ptab" data-tab="paypal">PayPal</button>
              <button class="ptab" data-tab="bank">Bank Transfer</button>
              <button class="ptab" data-tab="maribank">MariBank</button>
            </div>

            <div class="ppanel active" id="panel-wise">
              <div class="row2">
                <div class="field"><label>Account Holder</label><input type="text" id="wise-holder" value="Dawn Solomon" /></div>
                <div class="field"><label>Email / Username</label><input type="text" id="wise-email" value="dawnsolomon482@gmail.com" /></div>
              </div>
              <div class="row2">
                <div class="field"><label>IBAN</label><input type="text" id="wise-iban" placeholder="GB29 NWBK 6016 1331..." /></div>
                <div class="field"><label>SWIFT / BIC</label><input type="text" id="wise-swift" placeholder="TRWIGB2LXXX" /></div>
              </div>
              <div class="field"><label>Payment Reference</label><input type="text" id="wise-ref" placeholder="e.g. INV-202505-0001" /></div>
            </div>

            <div class="ppanel" id="panel-paypal">
              <div class="row2">
                <div class="field"><label>Account Holder</label><input type="text" id="pp-holder" value="Dawn Solomon" /></div>
                <div class="field"><label>PayPal Email</label><input type="email" id="pp-email" value="dawnbellosolomon@gmail.com" /></div>
              </div>
              <div class="field"><label>Payment Reference</label><input type="text" id="pp-ref" placeholder="e.g. Project name or invoice number" /></div>
            </div>

            <div class="ppanel" id="panel-bank">
              <div class="row2">
                <div class="field"><label>Account Holder</label><input type="text" id="bank-holder" placeholder="Dawn Solomon" /></div>
                <div class="field"><label>Bank Name</label><input type="text" id="bank-name" placeholder="e.g. DBS Bank" /></div>
              </div>
              <div class="row2">
                <div class="field"><label>Account Number</label><input type="text" id="bank-acct" placeholder="XXXX-XXXX-XXXX" /></div>
                <div class="field"><label>SWIFT / BIC</label><input type="text" id="bank-swift" placeholder="DBSSSGSG" /></div>
              </div>
              <div class="row2">
                <div class="field"><label>IBAN (if applicable)</label><input type="text" id="bank-iban" placeholder="Optional" /></div>
                <div class="field"><label>Payment Reference</label><input type="text" id="bank-ref" placeholder="e.g. Invoice number" /></div>
              </div>
            </div>

            <div class="ppanel" id="panel-maribank">
              <div class="row2">
                <div class="field"><label>Account Holder</label><input type="text" id="mari-holder" value="Dawn Solomon" /></div>
                <div class="field"><label>Account / Phone Number</label><input type="text" id="mari-acct" value="13891647329" /></div>
              </div>
              <div class="field"><label>Payment Reference</label><input type="text" id="mari-ref" placeholder="e.g. Invoice number" /></div>
            </div>

          </div>
        </section>

      </div><!-- /col-right -->
    </div>
  </main>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="modal-hd">
      <span class="modal-title">Invoice Preview</span>
      <div class="modal-acts">
        <button class="btn btn-pri" id="btn-modal-print">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Save as PDF
        </button>
        <button class="btn btn-ghost-dark" id="btn-close-modal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Close
        </button>
      </div>
    </div>
    <div class="modal-body">
      <div id="inv-wrap"></div>
    </div>
  </div>
</div>

<div id="print-zone"></div>

<script src="script.js"></script>
</body>
</html>
