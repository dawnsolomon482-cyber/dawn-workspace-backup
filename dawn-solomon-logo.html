<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dawn Solomon — Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f1a;
    font-family: 'Segoe UI', sans-serif;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    gap: 48px;
    align-items: flex-start;
  }
  .label {
    color: #444;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .card {
    background: #111827;
    border: 1px solid #1e2d3d;
    border-radius: 16px;
    padding: 40px 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .card.light {
    background: #f5f5f5;
  }
  .row { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>

  <!-- ICON ONLY SIZES -->
  <div>
    <div class="label">Icon — Dark</div>
    <div class="row">
      <div class="card">
        <svg width="80" height="80" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="60" height="60" rx="12" fill="#111827"/>
          <rect x="4" y="4" width="52" height="52" rx="9" fill="none" stroke="#00c9a7" stroke-width="2"/>
          <text x="30" y="42" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
        </svg>
      </div>
      <div class="card">
        <svg width="56" height="56" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="60" height="60" rx="12" fill="#111827"/>
          <rect x="4" y="4" width="52" height="52" rx="9" fill="none" stroke="#00c9a7" stroke-width="2"/>
          <text x="30" y="42" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
        </svg>
      </div>
      <div class="card">
        <svg width="36" height="36" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="60" height="60" rx="12" fill="#111827"/>
          <rect x="4" y="4" width="52" height="52" rx="9" fill="none" stroke="#00c9a7" stroke-width="2"/>
          <text x="30" y="42" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- WITH WORDMARK -->
  <div>
    <div class="label">With Wordmark — Dark</div>
    <div class="card">
      <svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="5" width="54" height="54" rx="10" fill="#111827"/>
        <rect x="3" y="8" width="48" height="48" rx="8" fill="none" stroke="#00c9a7" stroke-width="2"/>
        <text x="27" y="40" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
        <text x="72" y="32" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#ffffff" letter-spacing="0.5">Dawn Solomon</text>
        <text x="72" y="50" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#00c9a7" letter-spacing="2.5">AUTOMATION SPECIALIST</text>
      </svg>
    </div>
  </div>

  <!-- LIGHT VERSION -->
  <div>
    <div class="label">With Wordmark — Light</div>
    <div class="card light">
      <svg width="280" height="64" viewBox="0 0 280 64" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="5" width="54" height="54" rx="10" fill="#f5f5f5"/>
        <rect x="3" y="8" width="48" height="48" rx="8" fill="none" stroke="#00c9a7" stroke-width="2"/>
        <text x="27" y="40" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#00c9a7" text-anchor="middle">DS</text>
        <text x="72" y="32" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#0a0f1a" letter-spacing="0.5">Dawn Solomon</text>
        <text x="72" y="50" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#00c9a7" letter-spacing="2.5">AUTOMATION SPECIALIST</text>
      </svg>
    </div>
  </div>

</body>
</html>
