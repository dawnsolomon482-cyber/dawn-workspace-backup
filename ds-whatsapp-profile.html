<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DS WhatsApp Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .profile {
      width: 500px;
      height: 500px;
      background: #0b1623;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .inner-box {
      width: 320px;
      height: 320px;
      border: 5px solid #00d4aa;
      border-radius: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(0, 212, 170, 0.3);
    }
    .initials {
      font-size: 130px;
      font-weight: 900;
      color: #00d4aa;
      font-family: 'Arial Black', Arial, sans-serif;
      letter-spacing: -4px;
      text-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
    }
  </style>
</head>
<body>
  <div class="profile">
    <div class="inner-box">
      <span class="initials">DS</span>
    </div>
  </div>
</body>
</html>
